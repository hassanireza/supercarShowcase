<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Supercar Showcase">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05050a"/>
      <stop offset="100%" stop-color="#0c0c14"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="25%" stop-color="#ffb800"/>
      <stop offset="50%" stop-color="#3ecbff"/>
      <stop offset="75%" stop-color="#c9a24b"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e0e0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e0e0e0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e0e0e0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- grid -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
    <line x1="1100" y1="0" x2="1100" y2="320"/>
  </g>

  <!-- speed lines -->
  <g stroke="url(#fade)" stroke-width="1.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="272" x2="1200" y2="272"/>
  </g>

  <!-- accent sweep bar -->
  <rect x="80" y="122" width="220" height="6" rx="3" fill="url(#sweep)"/>

  <text x="80" y="108" font-family="Oswald, Arial Narrow, sans-serif" font-weight="600" font-size="16" letter-spacing="6" fill="#9a9aa4">SIX CARS &#183; ONE OBSESSION</text>

  <text x="78" y="205" font-family="Oswald, Arial Narrow, sans-serif" font-weight="700" font-size="76" letter-spacing="1" fill="#f2f2f4">SUPERCAR SHOWCASE</text>

  <text x="80" y="242" font-family="Inter, -apple-system, sans-serif" font-weight="300" font-size="18" fill="#9a9aa4">A scroll-driven, frame-by-frame product page &#8212; built the way Apple builds theirs.</text>

  <!-- frame counter mark, echoes the hero scrub mechanic -->
  <g transform="translate(1030,40)">
    <rect x="0" y="0" width="120" height="46" rx="8" fill="#0c0c14" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="14" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#9a9aa4">FRAME</text>
    <text x="14" y="38" font-family="JetBrains Mono, monospace" font-size="16" fill="#f2f2f4">0117 / 0180</text>
  </g>
</svg>
