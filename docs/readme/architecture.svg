<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Component architecture diagram">
  <defs>
    <style>
      .box { fill: #0c0c14; stroke: #ffffff; stroke-opacity: 0.14; stroke-width: 1.5; rx: 10; }
      .boxAccent { fill: #0c0c14; stroke-opacity: 0.9; stroke-width: 2; rx: 10; }
      .label { font-family: Oswald, Arial Narrow, sans-serif; font-weight: 600; font-size: 15; fill: #f2f2f4; letter-spacing: 0.5px; }
      .sub { font-family: Inter, -apple-system, sans-serif; font-size: 11; fill: #9a9aa4; }
      .edge { stroke: #ffffff; stroke-opacity: 0.22; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="#05050a"/>

  <!-- App root -->
  <rect x="500" y="24" width="200" height="56" class="box"/>
  <text x="600" y="48" text-anchor="middle" class="label">App.tsx</text>
  <text x="600" y="66" text-anchor="middle" class="sub">ScrollTrigger.refresh() lifecycle</text>

  <!-- Intro -->
  <rect x="80" y="140" width="180" height="52" class="box"/>
  <text x="170" y="163" text-anchor="middle" class="label">IntroSection</text>
  <text x="170" y="180" text-anchor="middle" class="sub">Title + scroll cue</text>

  <!-- CarSection (repeated x6) -->
  <rect x="330" y="140" width="220" height="52" class="boxAccent" stroke="#ff1a1a"/>
  <text x="440" y="163" text-anchor="middle" class="label">CarSection &#215; 6</text>
  <text x="440" y="180" text-anchor="middle" class="sub">one per car in cars.ts</text>

  <!-- Gallery -->
  <rect x="640" y="140" width="200" height="52" class="box"/>
  <text x="740" y="163" text-anchor="middle" class="label">GallerySection</text>
  <text x="740" y="180" text-anchor="middle" class="sub">horizontal card track</text>

  <!-- Footer -->
  <rect x="930" y="140" width="190" height="52" class="box"/>
  <text x="1025" y="163" text-anchor="middle" class="label">FooterSection</text>
  <text x="1025" y="180" text-anchor="middle" class="sub">fade-in on scroll</text>

  <!-- CarSection children -->
  <rect x="180" y="270" width="230" height="70" class="boxAccent" stroke="#ffb800"/>
  <text x="295" y="296" text-anchor="middle" class="label">HeroFrameScrub</text>
  <text x="295" y="313" text-anchor="middle" class="sub">GSAP pin &#215; canvas frame draw</text>
  <text x="295" y="329" text-anchor="middle" class="sub">binary-search frame detection</text>

  <rect x="440" y="270" width="200" height="70" class="box"/>
  <text x="540" y="296" text-anchor="middle" class="label">Detail Scrub</text>
  <text x="540" y="313" text-anchor="middle" class="sub">4-image grid</text>
  <text x="540" y="329" text-anchor="middle" class="sub">scroll fade-in</text>

  <rect x="670" y="270" width="200" height="70" class="box"/>
  <text x="770" y="296" text-anchor="middle" class="label">InlineVideo</text>
  <text x="770" y="313" text-anchor="middle" class="sub">color-reveal clip</text>
  <text x="770" y="329" text-anchor="middle" class="sub">lazy + muted-autoplay</text>

  <rect x="900" y="270" width="200" height="70" class="box"/>
  <text x="1000" y="296" text-anchor="middle" class="label">StatCounter</text>
  <text x="1000" y="313" text-anchor="middle" class="sub">count-up on enter</text>
  <text x="1000" y="329" text-anchor="middle" class="sub">0&#8211;60, top speed, weight</text>

  <!-- Centerpiece -->
  <rect x="330" y="400" width="260" height="70" class="boxAccent" stroke="#0a1e4d"/>
  <text x="460" y="426" text-anchor="middle" class="label">ExplodedViewCenterpiece</text>
  <text x="460" y="443" text-anchor="middle" class="sub">Bugatti Tourbillon only</text>
  <text x="460" y="459" text-anchor="middle" class="sub">GSAP pin: true, part-by-part reveal</text>

  <!-- gsapSetup util -->
  <rect x="700" y="530" width="240" height="60" class="box"/>
  <text x="820" y="555" text-anchor="middle" class="label">utils/gsapSetup.ts</text>
  <text x="820" y="572" text-anchor="middle" class="sub">gsap + ScrollTrigger, registered once</text>

  <rect x="80" y="530" width="240" height="60" class="box"/>
  <text x="200" y="555" text-anchor="middle" class="label">data/cars.ts</text>
  <text x="200" y="572" text-anchor="middle" class="sub">single source of truth per car</text>

  <!-- edges -->
  <path class="edge" d="M600,80 L170,140"/>
  <path class="edge" d="M600,80 L440,140"/>
  <path class="edge" d="M600,80 L740,140"/>
  <path class="edge" d="M600,80 L1025,140"/>

  <path class="edge" d="M410,192 L295,270"/>
  <path class="edge" d="M440,192 L540,270"/>
  <path class="edge" d="M470,192 L770,270"/>
  <path class="edge" d="M500,192 L1000,270"/>
  <path class="edge" d="M440,192 L460,400"/>

  <path class="edge" d="M460,470 L820,530"/>
  <path class="edge" d="M295,340 L820,530"/>
  <path class="edge" d="M440,192 L200,530"/>
  <path class="edge" d="M295,340 L200,530"/>
</svg>
